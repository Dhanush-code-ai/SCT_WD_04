<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Task Manager Dashboard</h1>
</header>

<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="incomplete.html">Incomplete Tasks</a>
    <a href="completed.html">Completed Tasks</a>
</nav>

<div class="container">

    <div class="card">

        <input
            type="text"
            id="taskName"
            placeholder="Task Name">

        <select id="category">
            <option>Work</option>
            <option>Personal</option>
            <option>Study</option>
            <option>Shopping</option>
        </select>

        <input
            type="datetime-local"
            id="taskDate">

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <div id="taskList"></div>

</div>

<script src="app.js"></script>

</body>
</html>
